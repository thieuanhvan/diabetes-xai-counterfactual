paths:
  data_csv: data/cdc_brfss_diabetes_2021.csv
  output_dir: outputs
random:
  seed: 42
data:
  sample_n: null
  sample_seed: 42
split:
  test_size: 0.2
  stratify: true
target: Diabetes_binary
xgboost:
  n_estimators: 500
  max_depth: 6
  learning_rate: 0.05
  subsample: 0.9
  colsample_bytree: 0.9
  min_child_weight: 1
  reg_lambda: 1.0
  tree_method: hist
  eval_metric: auc
  random_state: 42
  n_jobs: -1
dice:
  method: random
  n_counterfactuals: 5
  desired_class: 0
  proximity_weight: 0.5
  diversity_weight: 1.0
  per_query: true
evaluate:
  n_test_instances: 200
  plausibility_neighbors: 50
  compare_modes: true
taxonomy:
  conditional_class_disabled: false
run:
  notes_suffix: taxonomy_n_classes=5
  is_scratch: false
