# diabetes-xai-counterfactual default config

paths:
  data_csv: "data/cdc_brfss_diabetes_2021.csv"
  output_dir: "outputs"

random:
  seed: 42

split:
  test_size: 0.2
  stratify: true

target: "Diabetes_binary"

# XGBoost config — baseline verified on BRFSS 2021 (P2 run 12, AUC=0.8228)
xgboost:
  n_estimators: 500
  max_depth: 6
  learning_rate: 0.05
  subsample: 0.9
  colsample_bytree: 0.9
  min_child_weight: 1
  reg_lambda: 1.0
  tree_method: "hist"
  eval_metric: "auc"
  random_state: 42
  n_jobs: -1

# DiCE-ML counterfactual generation
dice:
  method: "random"           # "random" | "genetic" | "kdtree"
  n_counterfactuals: 5
  desired_class: 0            # flip prediction to "no diabetes"
  proximity_weight: 0.5
  diversity_weight: 1.0

# Evaluation
evaluate:
  n_test_instances: 200       # high-risk patients for CF generation
  plausibility_neighbors: 50
